<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: .5rem; color: #666; }
        input {
            width: 100%;
            padding: 0.8rem;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background-color: #0056b3; }
        #message { margin-top: 1rem; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">E-mail</label>
            <input type="email" id="username" name="username" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required placeholder="********">
        </div>
        <button type="submit" id="btnSubmit">Entrar</button>
    </form>
    <div id="message"></div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const messageDiv = document.getElementById('message');
    const webhookUrl = 'https://n8n.inetz.com.br/webhook-test/b0c4e44e-0332-4d73-a545-a3144fe4a33a';

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(loginForm);
        const data = Object.fromEntries(formData.entries());

        messageDiv.innerText = 'Enviando...';
        messageDiv.style.color = '#666';

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                messageDiv.innerText = 'Sucesso! Dados enviados ao n8n.';
                messageDiv.style.color = 'green';
                loginForm.reset();
            } else {
                messageDiv.innerText = 'Erro ao enviar dados.';
                messageDiv.style.color = 'red';
            }
        } catch (error) {
            messageDiv.innerText = 'Erro de conexão com o servidor.';
            messageDiv.style.color = 'red';
            console.error('Erro:', error);
        }
    });
</script>

</body>
</html>
